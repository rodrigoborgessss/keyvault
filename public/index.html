<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyVault — gestor de passwords</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ECRÃ DE BLOQUEIO -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-card">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5l8-3z" />
          </svg>
        </div>
        <h1>Key<span>Vault</span></h1>
      </div>
      <p class="lock-sub" id="lockSub">A carregar…</p>

      <div class="field">
        <label for="masterInput" id="masterLabel">Master password</label>
        <input type="password" id="masterInput" placeholder="••••••••••••" autocomplete="off" />
      </div>

      <div class="field" id="confirmField" style="display:none">
        <label for="confirmInput">Confirmar master password</label>
        <input type="password" id="confirmInput" placeholder="••••••••••••" autocomplete="off" />
      </div>

      <button class="btn btn-primary" id="unlockBtn">Desbloquear</button>
      <p class="error-msg" id="lockError"></p>
      <p class="hint" id="lockHint"></p>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5l8-3z" />
          </svg>
        </div>
        <h1>Key<span>Vault</span></h1>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="genBtn">Gerador</button>
        <div class="menu-wrap">
          <button class="btn btn-ghost btn-sm" id="menuBtn" title="Mais opções">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
          </button>
          <div class="menu-popover" id="menuPopover">
            <button class="menu-item" id="checkAllBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5l8-3z"/></svg>
              Verificar todas as passwords
            </button>
            <button class="menu-item" id="exportBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
              Exportar cofre (.json cifrado)
            </button>
            <button class="menu-item" id="importBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 7V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/></svg>
              Importar cofre…
            </button>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="lockBtn">Bloquear</button>
      </div>
    </div>

    <!-- barra de progresso da verificação em massa -->
    <div class="bulk-bar" id="bulkBar">
      <div class="bulk-text" id="bulkText">A verificar…</div>
      <div class="bulk-track"><div class="bulk-fill" id="bulkFill"></div></div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input type="text" id="searchInput" placeholder="Procurar…" autocomplete="off" />
          </div>
          <button class="btn btn-primary" id="addBtn">
            <svg class="add-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Nova entrada
          </button>
        </div>
        <div class="entries" id="entriesList"></div>
      </aside>

      <main class="main">
        <div class="main-inner" id="mainPanel"></div>
      </main>
    </div>
  </div>

  <!-- MODAL GERADOR -->
  <div class="modal-backdrop" id="genModal">
    <div class="modal">
      <h3>Gerador de passwords</h3>
      <p class="lock-sub">Aleatoriedade criptográfica. Copia ou usa numa entrada.</p>
      <div class="gen-output">
        <input type="text" id="genResult" readonly />
        <button class="icon-btn" id="genCopyBtn" title="Copiar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        </button>
        <button class="icon-btn" id="genRerollBtn" title="Gerar outra">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>
      <div class="gen-controls">
        <div class="slider-row">
          <label>Comprimento</label>
          <input type="range" id="genLength" min="8" max="64" value="18" />
          <output id="genLengthOut">18</output>
        </div>
        <div class="toggles">
          <label class="toggle"><input type="checkbox" id="genUpper" checked /> Maiúsculas (A-Z)</label>
          <label class="toggle"><input type="checkbox" id="genLower" checked /> Minúsculas (a-z)</label>
          <label class="toggle"><input type="checkbox" id="genDigits" checked /> Dígitos (0-9)</label>
          <label class="toggle"><input type="checkbox" id="genSymbols" checked /> Símbolos (!@#)</label>
          <label class="toggle"><input type="checkbox" id="genAmbig" /> Sem ambíguos (Il1O0)</label>
        </div>
      </div>
      <button class="btn btn-ghost btn-block" id="genCloseBtn">Fechar</button>
    </div>
  </div>

  <input type="file" id="importInput" accept="application/json,.json" style="display:none" />

  <!-- TOAST -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
    <span id="toastMsg"></span>
  </div>

  <script src="vendor/argon2id.bundle.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/pwned.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/strength.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
